name: k6-load-tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # WARM UP — despierta el servidor de Render antes de los tests
      - name: Warm up API (Render cold start)
        run: |
          echo "Warming up API..."
          curl -s --max-time 60 ${{ secrets.BASE_URL }} || true
          sleep 5

      # AUTH TEST — login + /api/auth/me
      - name: Run k6 auth test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TEST_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.GRAFANA_CLOUD_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "false"
        run: |
          mkdir -p k6-out
          k6 run \
            --out experimental-prometheus-rw \
            --tag testid=auth-test \
            --summary-export=k6-out/auth-summary.json \
            tests/k6/stayas-auth.test.js

      # LOAD TEST — login admin + GET /api/users
      - name: Run k6 load test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.GRAFANA_CLOUD_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "false"
        run: |
          k6 run \
            --out experimental-prometheus-rw \
            --tag testid=load-test \
            --summary-export=k6-out/load-summary.json \
            tests/k6/loadtest.js

      # ARTIFACT — guardar resultados como evidencia descargable
      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-out