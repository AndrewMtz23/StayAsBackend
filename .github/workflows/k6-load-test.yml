name: CI Pipeline (k6 + SonarQube)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:

  # -----------------------------
  # SAST — SonarQube
  # -----------------------------
  sonar:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=sast-project
            -Dsonar.sources=.

      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -----------------------------
  # PERFORMANCE — k6
  # -----------------------------
  k6:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Warm up API
        run: |
          echo "Warming up API..."
          curl -s --max-time 60 ${{ secrets.BASE_URL }} || true
          sleep 5

      - name: Run k6 auth test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TEST_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p k6-out
          k6 run \
            --summary-export=k6-out/auth-summary.json \
            tests/k6/stayas-auth.test.js

      - name: Run k6 load test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          k6 run \
            --summary-export=k6-out/load-summary.json \
            tests/k6/loadtest.js

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-out

  # -----------------------------
  # DOCKER — Build & Push
  # -----------------------------
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: k6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/andrewmtz23/stayasbackend:latest
          build-args: |
            DOCKER_DATABASE_URL=${{ secrets.DOCKER_DATABASE_URL }}