name: CI Pipeline (k6 + SonarQube)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

  # -----------------------------
  # SAST — SonarQube
  # -----------------------------
  sonar:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=sast-project
            -Dsonar.sources=.

      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -----------------------------
  # PERFORMANCE — k6
  # -----------------------------
  k6:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # WARM UP — despierta el servidor
      - name: Warm up API (Render cold start)
        run: |
          echo "Warming up API..."
          curl -s --max-time 60 ${{ secrets.BASE_URL }} || true
          sleep 5

      # AUTH TEST
      - name: Run k6 auth test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TEST_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.GRAFANA_CLOUD_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "false"
        run: |
          mkdir -p k6-out
          k6 run \
            --out experimental-prometheus-rw \
            --tag testid=auth-test \
            --summary-export=k6-out/auth-summary.json \
            tests/k6/stayas-auth.test.js

      # LOAD TEST
      - name: Run k6 load test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.GRAFANA_CLOUD_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "false"
        run: |
          k6 run \
            --out experimental-prometheus-rw \
            --tag testid=load-test \
            --summary-export=k6-out/load-summary.json \
            tests/k6/loadtest.js

      # ARTIFACT — guardar resultados
      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-out