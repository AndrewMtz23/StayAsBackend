name: CI Pipeline (k6 + SonarQube)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: andrewmtz23/stayasbackend

jobs:

  # -----------------------------
  # SAST — SonarQube
  # -----------------------------
  sonar:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=sast-project
            -Dsonar.sources=.

      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -----------------------------
  # PERFORMANCE — k6
  # -----------------------------
  k6:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Warm up API
        run: |
          echo "Warming up API..."
          curl -s --max-time 60 ${{ secrets.BASE_URL }} || true
          sleep 5

      - name: Run k6 auth test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TEST_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p k6-out
          k6 run \
            --summary-export=k6-out/auth-summary.json \
            tests/k6/stayas-auth.test.js || true

      - name: Run k6 load test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          k6 run \
            --summary-export=k6-out/load-summary.json \
            tests/k6/loadtest.js || true

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-out

  # -----------------------------
  # DOCKER — Build & Push
  # -----------------------------
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: k6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/andrewmtz23/stayasbackend:latest
          build-args: |
            DOCKER_DATABASE_URL=${{ secrets.DOCKER_DATABASE_URL }}

  # -----------------------------
  # DEPLOY — Automatic Deployment
  # -----------------------------
  deploy:
    name: Deploy to Cloud Server
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Login to GHCR"
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Stopping previous container"
            docker stop stayas-backend || true
            docker rm stayas-backend || true

            echo "Pulling latest image"
            docker pull ghcr.io/andrewmtz23/stayasbackend:latest

            echo "Starting new container"
            docker run -d \
              --name stayas-backend \
              -p 80:4000 \
              --restart always \
              ghcr.io/andrewmtz23/stayasbackend:latest

            echo "Deployment completed"